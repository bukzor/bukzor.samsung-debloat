$schema: "http://json-schema.org/draft-07/schema#"
title: Device-registry frontmatter
description: |
  Frontmatter for items in devices.kb/. One physical device per file.
type: object
required:
  - owner
  - status
properties:
  owner:
    type: string
    description: Whose device this is (e.g. "mother").
  model:
    type: string
    description: Marketing name + model number if known; "unconfirmed" if not.
  status:
    enum: [active, retired]
    description: active = currently in use / worked on; retired = replaced/broken.
  serial:
    type: string
    description: ADB serial, if known (used for `adb -s`).
  acquired:
    type: string
    pattern: '^\d{4}-\d{2}(-\d{2})?$'
  retired:
    type: string
    pattern: '^\d{4}-\d{2}(-\d{2})?$'
  devlogs:
    type: array
    items:
      type: string
    description: Devlog entry slugs that worked on this device.
additionalProperties: false

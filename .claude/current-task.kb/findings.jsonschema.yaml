$schema: "http://json-schema.org/draft-07/schema#"
title: Forensic-finding frontmatter
description: |
  Frontmatter for items in findings.kb/. Each item is one evidence-backed
  finding about the current device investigation.

type: object
required:
  - status
  - confidence
  - last-updated

properties:
  status:
    oneOf:
      - const: confirmed
        description: Established by direct on-device evidence.
      - const: suspected
        description: Evidence points this way but is not yet conclusive.
      - const: needs-investigation
        description: Flagged; requires a further step to resolve.
      - const: ruled-out
        description: Considered and dismissed (e.g. false positive).
  confidence:
    oneOf:
      - const: high
      - const: medium
      - const: low
    description: Subjective confidence in the finding as stated.
  relates-to:
    type: array
    items:
      oneOf:
        - const: adware
        - const: card-fraud
        - const: general
    description: Which investigation thread(s) the finding bears on.
  last-updated:
    type: string
    pattern: '^\d{4}-\d{2}-\d{2}$'

additionalProperties: false

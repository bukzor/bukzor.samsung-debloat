$schema: "http://json-schema.org/draft-07/schema#"
title: Summary-file frontmatter (current-task.kb root scope)
description: |
  Frontmatter for the root summary file current-task.kb/README.md.
type: object
required:
  - last-updated
properties:
  last-updated:
    type: string
    pattern: '^\d{4}-\d{2}-\d{2}$'
additionalProperties: false
